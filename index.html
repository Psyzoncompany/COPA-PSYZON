<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COPA PSYZON</title>
  <meta name="description" content="COPA PSYZON — Plataforma de Gerenciamento de Torneio Eliminatório">
  <style>
    /* Critical: prevent FOUC while CSS loads */
    body { font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================
       1. LOGIN SCREEN
       ============================================ -->
  <section id="login-screen" class="login-screen">
    <div class="login-card">
      <!-- Branding -->
      <div class="login-branding">
        <span class="login-emoji">⚽🏆</span>
        <h1 class="login-title">COPA PSYZON</h1>
        <p class="login-subtitle">Torneio Eliminatório</p>
      </div>

      <!-- Admin Login -->
      <div class="login-section">
        <button type="button" id="btn-show-login" class="btn btn-primary btn-block">
          🔑 LOGIN DONO
        </button>

        <form id="login-form" class="login-form" style="display:none;" autocomplete="off">
          <div class="form-group">
            <label for="login-email">E-mail</label>
            <input type="email" id="login-email" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">Senha</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">ENTRAR</button>
          <p id="login-error" class="login-error" role="alert"></p>
        </form>
      </div>

      <!-- Divider -->
      <div class="login-divider">
        <span>ou</span>
      </div>

      <!-- Visitor Entry -->
      <button type="button" id="btn-visitor" class="btn btn-secondary btn-block">
        👁️ ENTRAR COMO VISITANTE
      </button>
    </div>
  </section>

  <!-- ============================================
       2. MAIN APP (hidden until authenticated)
       ============================================ -->
  <div id="main-app" style="display:none;">

    <!-- ---- Header ---- -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="header-logo">⚽ COPA PSYZON</h1>
      </div>
      <div class="header-right">
        <span id="role-badge" class="role-badge">VISITANTE</span>
        <button type="button" id="btn-logout" class="btn btn-sm btn-outline">Sair</button>
      </div>
    </header>

    <!-- ---- Content Wrapper (sidebar + main) ---- -->
    <div class="content-wrapper">

      <!-- ---- Admin Sidebar ---- -->
      <aside id="admin-sidebar" class="sidebar admin-only">

        <!-- Tournament Config -->
        <section class="sidebar-section">
          <h2 class="sidebar-heading">⚙️ Configuração do Torneio</h2>
          <div class="form-group">
            <label for="tournament-name">Nome do Torneio</label>
            <input type="text" id="tournament-name" placeholder="Ex: Copa Psyzon 2025" maxlength="60">
          </div>
          <div class="form-group">
            <label for="team-count">Quantidade de Times</label>
            <select id="team-count">
              <option value="4">4 Times</option>
              <option value="8" selected>8 Times</option>
              <option value="16">16 Times</option>
            </select>
          </div>
        </section>

        <!-- Prize / Premiação -->
        <section class="sidebar-section">
          <h2 class="sidebar-heading">🏅 Premiação</h2>
          <div class="form-group">
            <label for="prize-description">Descrição do Prêmio</label>
            <textarea id="prize-description" rows="3" placeholder="Ex: R$500 + Troféu para o campeão"></textarea>
          </div>
          <button type="button" id="btn-save-prize" class="btn btn-sm btn-primary btn-block">
            Salvar Premiação
          </button>
        </section>

        <!-- Team Registration -->
        <section class="sidebar-section">
          <h2 class="sidebar-heading">📋 Cadastro de Times</h2>
          <div class="form-group">
            <label for="team-name-input">Nome do Time</label>
            <input type="text" id="team-name-input" placeholder="Ex: Falcões FC" maxlength="40">
          </div>
          <div class="form-group">
            <label for="player-name-input">Jogador (representante)</label>
            <input type="text" id="player-name-input" placeholder="Ex: João Silva" maxlength="40">
          </div>
          <button type="button" id="btn-add-team" class="btn btn-sm btn-success btn-block">
            ➕ Adicionar Time
          </button>
          <div id="team-list" class="team-list"></div>
        </section>

        <!-- Actions -->
        <section class="sidebar-section sidebar-actions">
          <button type="button" id="btn-generate" class="btn btn-primary btn-block">
            🔀 Gerar Chaveamento
          </button>
          <button type="button" id="btn-reset" class="btn btn-danger btn-block">
            🗑️ Resetar Torneio
          </button>
        </section>

      </aside>

      <!-- ---- Main Content Area ---- -->
      <main id="main-content" class="main-content">

        <!-- Prize Display Banner -->
        <div id="prize-display" class="prize-display" style="display:none;">
          <span class="prize-icon">🏅</span>
          <p id="prize-text" class="prize-text"></p>
        </div>

        <!-- Tournament Title -->
        <div id="tournament-title-display" class="tournament-title-display"></div>

        <!-- Bracket -->
        <div id="bracket-container" class="bracket-container"></div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state">
          <span class="empty-icon">⚽</span>
          <p class="empty-title">Nenhum torneio ativo</p>
          <p class="empty-subtitle">Configure os times e gere o chaveamento para começar.</p>
        </div>

      </main>

    </div><!-- /.content-wrapper -->

  </div><!-- /#main-app -->

  <!-- ============================================
       3. SCORE MODAL
       ============================================ -->
  <div id="score-modal" class="modal-overlay" style="display:none;">
    <div class="modal-backdrop" data-dismiss="modal"></div>
    <div class="modal-card">
      <h2 id="modal-title" class="modal-title">Registrar Resultado</h2>

      <div class="modal-teams">
        <!-- Team 1 -->
        <div class="modal-team">
          <span id="modal-team1-name" class="modal-team-name">Time A</span>
          <input type="number" id="modal-team1-score" class="score-input" min="0" value="0" placeholder="0">
        </div>

        <!-- VS Divider -->
        <div class="modal-vs">VS</div>

        <!-- Team 2 -->
        <div class="modal-team">
          <span id="modal-team2-name" class="modal-team-name">Time B</span>
          <input type="number" id="modal-team2-score" class="score-input" min="0" value="0" placeholder="0">
        </div>
      </div>

      <!-- Penalties Section (hidden by default) -->
      <div id="penalties-section" class="penalties-section" style="display:none;">
        <label class="penalties-label">
          <input type="checkbox" id="penalties-check"> Decidido nos Pênaltis?
        </label>
        <div id="penalties-inputs" class="penalties-inputs" style="display:none;">
          <div class="penalty-group">
            <span id="penalty-team1-name" class="penalty-team-name">Time A</span>
            <input type="number" id="penalty-team1-score" class="score-input score-input-sm" min="0" value="0" placeholder="0">
          </div>
          <span class="penalty-x">✕</span>
          <div class="penalty-group">
            <span id="penalty-team2-name" class="penalty-team-name">Time B</span>
            <input type="number" id="penalty-team2-score" class="score-input score-input-sm" min="0" value="0" placeholder="0">
          </div>
        </div>
      </div>

      <!-- Modal Actions -->
      <div class="modal-actions">
        <button type="button" id="btn-confirm-score" class="btn btn-primary">Confirmar Resultado</button>
        <button type="button" id="btn-cancel-modal" class="btn btn-outline">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- ============================================
       4. TOAST CONTAINER
       ============================================ -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ============================================
       5. CONFETTI CANVAS
       ============================================ -->
  <canvas id="confetti-canvas" style="display:none;"></canvas>

  <!-- ============================================
       6. CHAMPION BANNER / MODAL
       ============================================ -->
  <div id="champion-banner" class="champion-banner" style="display:none;">
    <div class="champion-content">
      <span class="champion-emoji">🏆</span>
      <h2 id="champion-team-name" class="champion-title"></h2>
      <p class="champion-subtitle">Campeão do Torneio!</p>
      <button type="button" id="btn-close-champion" class="btn btn-outline btn-sm">Fechar</button>
    </div>
  </div>

  <!-- ============================================
       SCRIPTS
       ============================================ -->
  <!-- Firebase SDK v9 Compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- App -->
  <script src="script.js"></script>

</body>
</html>
