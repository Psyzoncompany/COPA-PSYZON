<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Clientes — COPA PSYZON</title>
  <meta name="description" content="Ficha técnica dos participantes da Copa Psyzon">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Override clientes inline styles for Win2K */
    .clients-page { background: #008080; }
  </style>
</head>

<body>
  <div class="clients-page">

    <!-- Header -->
    <header class="clients-header">
      <a href="index.html" class="btn-back">
        <svg class="svg-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6" />
        </svg> Voltar
      </a>
      <h1>
        <svg class="svg-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg> Ficha dos Clientes
      </h1>
    </header>

    <!-- Clients Count -->
    <div id="clients-count" class="clients-count"></div>

    <!-- Clients Grid -->
    <div id="clients-grid" class="clients-grid"></div>

    <!-- Empty State -->
    <div id="empty-clients" class="empty-clients" style="display:none;">
      <svg class="svg-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
        <circle cx="9" cy="7" r="4" />
        <line x1="17" x2="22" y1="11" y2="11" />
      </svg>
      <p style="font-weight:700;">Nenhum participante cadastrado</p>
      <p>Os participantes aparecerão aqui conforme se cadastrarem.</p>
    </div>

    <!-- Profile Detail Modal -->
    <div id="profile-detail-overlay" class="profile-detail-overlay">
      <div class="profile-detail-card">
        <div id="detail-avatar" class="profile-detail-avatar"></div>
        <h2 id="detail-name" class="profile-detail-name"></h2>
        <p id="detail-nick" class="profile-detail-nick"></p>

        <div class="profile-stats-row">
          <div class="stat-item">
            <div id="detail-trophies" class="stat-value">0</div>
            <div class="stat-label">Troféus</div>
          </div>
          <div class="stat-item">
            <div id="detail-finals" class="stat-value">0</div>
            <div class="stat-label">Finais</div>
          </div>
          <div class="stat-item">
            <div id="detail-semis" class="stat-value">0</div>
            <div class="stat-label">Semifinais</div>
          </div>
        </div>

        <div id="detail-fields" class="profile-detail-fields"></div>

        <button type="button" id="btn-close-detail" class="btn btn-outline btn-sm" style="margin-top:8px;">Fechar</button>
      </div>
    </div>

    <!-- Sponsors Section (Global) -->
    <div class="sponsors-wrapper px-5" style="margin-bottom: 40px;"></div>

  </div>

  <!-- Global script -->
  <script src="common.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    (function () {
      'use strict';

      const firebaseConfig = {
        apiKey: "AIzaSyDPH-ltsHg4nYeoZpDPq_80sfvcMaS-oXs",
        authDomain: "copa-psyzon.firebaseapp.com",
        projectId: "copa-psyzon",
        storageBucket: "copa-psyzon.firebasestorage.app",
        messagingSenderId: "74729053927",
        appId: "1:74729053927:web:ec295dcc38c640256d8c42"
      };

      let db = null;
      let auth = null;

      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
      } catch (_) { }

      const $ = (sel) => document.querySelector(sel);

      function sanitize(str) {
        if (typeof str !== 'string') return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function initials(name) {
        if (!name) return '?';
        const parts = name.trim().split(/\s+/);
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
      }

      function formatCPFMasked(cpf) {
        if (!cpf || cpf.length < 11) return '***.***.***-**';
        return cpf.substring(0, 3) + '.***.***-' + cpf.substring(9, 11);
      }

      let state = { participants: [], teams: [], playerStats: {} };

      function renderClients() {
        const grid = $('#clients-grid');
        const empty = $('#empty-clients');
        const countEl = $('#clients-count');
        if (!grid) return;

        const participants = state.participants || [];

        if (participants.length === 0) {
          grid.innerHTML = '';
          if (empty) empty.style.display = '';
          if (countEl) countEl.textContent = '';
          return;
        }

        if (empty) empty.style.display = 'none';
        if (countEl) countEl.textContent = `${participants.length} participante(s) cadastrado(s)`;

        let html = '';
        participants.forEach((p, idx) => {
          const avatar = p.photo
            ? '<img src="' + sanitize(p.photo) + '" alt="">'
            : '<span class="av-placeholder">' + sanitize(initials(p.name)) + '</span>';

          const igBadge = p.instagram
            ? '<span>📸 ' + sanitize(p.instagram) + '</span>'
            : '';

          html += `
            <div class="client-card" data-idx="${idx}">
              <div class="client-avatar">${avatar}</div>
              <div class="client-info">
                <div class="client-name">${sanitize(p.name)}</div>
                <div class="client-nick">${sanitize(p.nick)}</div>
                <div class="client-meta">
                  ${igBadge}
                  <span class="client-badge">Código: ${sanitize(p.code)}</span>
                </div>
              </div>
            </div>`;
        });

        grid.innerHTML = html;

        // Click handlers
        grid.querySelectorAll('.client-card').forEach(card => {
          card.addEventListener('click', () => {
            const idx = parseInt(card.dataset.idx, 10);
            openDetail(participants[idx]);
          });
        });
      }

      function openDetail(p) {
        if (!p) return;
        const overlay = $('#profile-detail-overlay');
        if (!overlay) return;

        // Avatar
        const avatarEl = $('#detail-avatar');
        if (avatarEl) {
          if (p.photo) {
            avatarEl.innerHTML = '<img src="' + sanitize(p.photo) + '" alt="">';
          } else {
            avatarEl.innerHTML = '<span class="av-placeholder">' + sanitize(initials(p.name)) + '</span>';
          }
        }

        // Name & nick
        const nameEl = $('#detail-name');
        const nickEl = $('#detail-nick');
        if (nameEl) nameEl.textContent = p.name;
        if (nickEl) nickEl.textContent = p.nick;

        // Stats
        const team = (state.teams || []).find(t => t.id === p.id);
        const stats = (state.playerStats && state.playerStats[p.id]) || {};
        const trEl = $('#detail-trophies');
        const fiEl = $('#detail-finals');
        const sfEl = $('#detail-semis');
        if (trEl) trEl.textContent = stats.trophies || 0;
        if (fiEl) fiEl.textContent = stats.finals || 0;
        if (sfEl) sfEl.textContent = stats.semifinals || 0;

        // Fields
        const fieldsEl = $('#detail-fields');
        if (fieldsEl) {
          let fieldsHtml = '';

          fieldsHtml += `<div class="profile-field">
            <div class="profile-field-label">CPF</div>
            <div class="profile-field-value">${formatCPFMasked(p.cpf)}</div>
          </div>`;

          if (p.instagram) {
            const handle = p.instagram.replace(/^@/, '');
            fieldsHtml += `<div class="profile-field">
              <div class="profile-field-label">Instagram</div>
              <div class="profile-field-value"><a href="https://instagram.com/${encodeURIComponent(handle)}" target="_blank" rel="noopener">@${sanitize(handle)}</a></div>
            </div>`;
          }

          if (p.whatsapp) {
            fieldsHtml += `<div class="profile-field">
              <div class="profile-field-label">WhatsApp</div>
              <div class="profile-field-value">${sanitize(p.whatsapp)}</div>
            </div>`;
          }

          fieldsHtml += `<div class="profile-field">
            <div class="profile-field-label">Código Utilizado</div>
            <div class="profile-field-value">${sanitize(p.code)}</div>
          </div>`;

          if (p.registeredAt) {
            try {
              const d = new Date(p.registeredAt);
              const formatted = d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
              fieldsHtml += `<div class="profile-field">
                <div class="profile-field-label">Data de Cadastro</div>
                <div class="profile-field-value">${formatted}</div>
              </div>`;
            } catch (_) { }
          }

          fieldsEl.innerHTML = fieldsHtml;
        }

        overlay.classList.add('active');
      }

      function closeDetail() {
        const overlay = $('#profile-detail-overlay');
        if (overlay) overlay.classList.remove('active');
      }

      // Close modal
      const btnClose = $('#btn-close-detail');
      if (btnClose) btnClose.addEventListener('click', closeDetail);

      const overlay = $('#profile-detail-overlay');
      if (overlay) {
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) closeDetail();
        });
      }

      // Subscribe to Firestore
      if (db) {
        db.collection('tournaments').doc('main').onSnapshot((doc) => {
          if (doc.exists) {
            const data = doc.data();
            state.participants = data.participants || [];
            state.teams = data.teams || [];
            state.playerStats = data.playerStats || {};
          }
          renderClients();
        });
      }

      // Check auth - redirect if not admin
      if (auth) {
        auth.onAuthStateChanged((user) => {
          if (!user) {
            // Not logged in - redirect to main page
            window.location.href = 'index.html';
          }
        });
      }
    })();
  </script>
</body>

</html>
